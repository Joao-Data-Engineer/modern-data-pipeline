services:

  # ──────────────────────────────────────────
  # 1) Airflow metadata DB  (internal only)
  # ──────────────────────────────────────────
  postgres_airflow:
    image: postgres:15
    container_name: mdp_postgres_airflow
    environment:
      POSTGRES_USER: ${AIRFLOW_DB_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD}
      POSTGRES_DB: ${AIRFLOW_DB_NAME}
    volumes:
      - postgres_airflow_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${AIRFLOW_DB_USER}"]
      interval: 5s
      retries: 5

  # ──────────────────────────────────────────
  # 2) Data Warehouse DB  (your actual data)
  # ──────────────────────────────────────────
  postgres_dw:
    image: postgres:15
    container_name: mdp_postgres_dw
    environment:
      POSTGRES_USER: ${DW_USER}
      POSTGRES_PASSWORD: ${DW_PASSWORD}
      POSTGRES_DB: ${DW_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_dw_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DW_USER}"]
      interval: 5s
      retries: 5

  # ──────────────────────────────────────────
  # 3) Airflow init (runs once)
  # ──────────────────────────────────────────
  airflow-init:
    image: apache/airflow:2.9.3
    container_name: mdp_airflow_init
    depends_on:
      postgres_airflow:
        condition: service_healthy
      postgres_dw:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres_airflow:5432/${AIRFLOW_DB_NAME}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      DW_CONN: postgresql+psycopg2://${DW_USER}:${DW_PASSWORD}@postgres_dw:5432/${DW_DB}
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./requirements.txt:/requirements.txt
      - ./ingestion:/opt/airflow/ingestion
      - ./warehouse:/opt/airflow/warehouse
    command: >
      bash -c "pip install -r /requirements.txt &&
      airflow db migrate &&
      airflow connections add 'postgres_dw'
        --conn-type postgres
        --conn-host postgres_dw
        --conn-schema ${DW_DB}
        --conn-login ${DW_USER}
        --conn-password ${DW_PASSWORD}
        --conn-port 5432 || true &&
      airflow users create
        --username ${AIRFLOW_ADMIN_USER}
        --password ${AIRFLOW_ADMIN_PASSWORD}
        --firstname admin
        --lastname admin
        --role Admin
        --email ${AIRFLOW_ADMIN_EMAIL} || true"

  # ──────────────────────────────────────────
  # 4) Airflow webserver
  # ──────────────────────────────────────────
  airflow-webserver:
    image: apache/airflow:2.9.3
    container_name: mdp_airflow_webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres_airflow:5432/${AIRFLOW_DB_NAME}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      PYTHONPATH: /opt/airflow/dags:/opt/airflow
      DW_CONN: postgresql+psycopg2://${DW_USER}:${DW_PASSWORD}@postgres_dw:5432/${DW_DB}
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./requirements.txt:/requirements.txt
      - ./ingestion:/opt/airflow/ingestion
      - ./warehouse:/opt/airflow/warehouse
    ports:
      - "8080:8080"
    command: >
      bash -c "pip install -r /requirements.txt && airflow webserver"

  # ──────────────────────────────────────────
  # 5) Airflow scheduler
  # ──────────────────────────────────────────
  airflow-scheduler:
    image: apache/airflow:2.9.3
    container_name: mdp_airflow_scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres_airflow:5432/${AIRFLOW_DB_NAME}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      PYTHONPATH: /opt/airflow/dags:/opt/airflow
      DW_CONN: postgresql+psycopg2://${DW_USER}:${DW_PASSWORD}@postgres_dw:5432/${DW_DB}
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./requirements.txt:/requirements.txt
      - ./ingestion:/opt/airflow/ingestion
      - ./warehouse:/opt/airflow/warehouse
    command: >
      bash -c "pip install -r /requirements.txt && airflow scheduler"

volumes:
  postgres_airflow_data:
  postgres_dw_data:
