nyc_taxi:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('DBT_HOST', 'localhost') }}"
      port: "{{ env_var('DBT_PORT', '5432') | int }}"
      user: "{{ env_var('DBT_USER', 'mdp') }}"
      password: "{{ env_var('DBT_PASSWORD', 'mdp') }}"
      dbname: "{{ env_var('DBT_DBNAME', 'mdp_dw') }}"
      schema: staging
      threads: 4
